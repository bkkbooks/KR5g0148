front:
  text: 洞眞八景玉籙晨圖隱符
  hash: sha256:49d9f09c0903c49e128e306715f293dc15fb1f05d30d8bb12f03872ba1afdf60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0148_HFL_000-001a, image: hfl/1031/1031-097.png}
body:
  text: 上相青童君撰太上大道君所受九暉太晨隱符鬱悦那林昌玉臺天玉清紫道虚皇上君所佩以赤書碧文九寸觀靈元晨隱符高桃厲沖龍羅天玉清翼曰虚皇上道君所佩以赤書絳文九寸緫晨九極隱符碧落空歌餘梨天玉清昌陽姬虚皇高元君所佩以赤書白素九寸沓曜璇根隱符𨚧摩坦婁于翳天玉清七靜導生高上虚皇君所佩以赤書皂繒九寸玄景晨平隱符扶刀蓋華浮羅天玉清太明虚皇洞清君所佩以朱書黄繒九寸合暉晨命隱符具渭耶渠初默天玉清始元虚皇太霄君所佩以赤書黄繒九寸齊暉晨玄隱符沖容育鬱離沙天玉清七觀无生虚皇金靈君所佩以朱書黄繒九寸高上龍烟隱符單緣察寳輪法天玉清八觀高元虚皇淳景君所佩朱書黄繒九寸上清八景玉籙晨圖隱符太上大道君所受玉清高上君所寳祕夫有金簡玉字名刊帝籙乃得聞見自不誦詠大洞眞經三十九章三寳神眞雌一八間十二上願招霞服精赤景奔月結璘之道莫得佩玉籙八景晨圖玄隱之符有得隱符之子八年剋乘八景之輿此文隱祕非世所聞玉清高上常藏於金蘭玉匱七映之房封以丹蘂之笈付仙都左公命金晨玉童二十四人玉華玉女三十六人侍衛隱符記功明善玄眞下教七千年聽得三傳自无其人封於名山不得輕眞泄寳師及弟子連愆七祖運濛山之石填積夜之河身及先師同充下鬼十苦八難无極之役今撰集其文明愼之㫖得佩太上大道君所受隱符者當以别室燒香左右朝夕禮拜不得雜履淹穢觸真忤炁玉童玉女奏子之罪於高上罰以水火之考天眞祕重可不愼之受符之身每至八節之日及本命日沐浴入室正中夜半惟一北向心拜㝠目存三素之雲從天上西北行下覆滿一室内外掩瞑良乆兩手掩耳口引雲炁三十咽咽畢覺雲炁豁除有二小兒如嬰兒之狀各持錦囊一囊請八景玉籙隱文一囊請三寳神經授與兆身二兒因化爲二帝尊入兆身中因呪曰出玄入清迴晨華房教我授我元英白元雌一哺養五籍洞玄三十九章萬遍胎生保魂招神披覩洞門玉符已畢身乘紫雲上謁北帝朝拜玉清畢又叩齒九通咽液三十過如此八年剋有八天玉景玄雲緑軿來請子身上登玉清宫修行勿懈勤心注玄高上所寳太上大道所尊惟在精誠祕而奉焉高清太無極上道君隱符彌梵羅臺霄絶寥丘飛元雲根之都玉清上天玉清紫暉太上玉皇明上大道君所佩每至本命日以朱書青紙服之雌黄書素帶之此符制御天下萬靈大匿魔神謡歌之鬼通靈致眞誦詠無有亂音之凶佩符誦經萬遍自當有三元遣八景之轝來迎兆身上登玉清宫晨圖隱符出自八无虚生之宫凝炁成章玉清紫道虚皇上君以授太上大道君佩八天無鞅之宫積七千劫付上相青童君使授季世當仙之夫世無其文自非金簡玉籙不得叅聞此道高妙非素紙所能得書非口所能得言推百六之運於三代之中採擇聖佐不得不傳下世耳傳授之法當依玄科七千年内三傳夙有仙骨立盟告誓賫紫金八兩紫紋八十尺𧵥而受焉師授信當施之寒栖之路卹窮厄之夫不得營己明科不可得而違深自詳愼衍盟負誓身被風刀之考充下鬼无極之役詳而傳之量而奉焉昔周幽王時有金谷子本姓王字玄度凡人耳忽過北岳得一玉函開見八景隱符玄度不知書悟是神文案文佩之亦不修行遂得三素之雲恒覆其身於此自號爲金谷子八年遂乘雲而昇今受號爲九宫外仙之任坐不備其事不登玉帝之庭此王君所傳矣洞眞八景玉籙晨圖隱符
